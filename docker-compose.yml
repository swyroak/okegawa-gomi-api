services:
  okegawa-api:
    build: .
    container_name: okegawa-api
    restart: always
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.okegawa.rule=Host(`your-domain.com`) && PathPrefix(`/gomi`)"
      - "traefik.http.middlewares.okegawa-strip.stripprefix.prefixes=/gomi"
      - "traefik.http.routers.okegawa.middlewares=okegawa-strip"
      - "traefik.http.routers.okegawa.tls.certresolver=letsencrypt"

  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: always
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=your@email.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"

volumes:
  letsencrypt:
